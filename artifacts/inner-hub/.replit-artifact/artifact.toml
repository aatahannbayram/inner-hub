kind = "web"
previewPath = "/"
title = "inner.hub"
version = "1.0.0"
id = "artifacts/inner-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23124

[services.development]
run = "pnpm --filter @workspace/inner-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inner-hub", "run", "build" ]
publicDir = "artifacts/inner-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23124"
BASE_PATH = "/"
